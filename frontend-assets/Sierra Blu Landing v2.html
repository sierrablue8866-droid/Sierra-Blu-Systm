*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}

@keyframes fadeUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulseRing{0%,100%{transform:scale(1);opacity:.45}50%{transform:scale(2);opacity:0}}
@keyframes shimmerLine{0%,100%{opacity:.3}50%{opacity:1}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes goldShimmer{0%{background-position:0% center}100%{background-position:200% center}}

/* ── Card dealing animation ── */
@keyframes dealCard{
  0%  {opacity:0;transform:translateX(72px) rotate(10deg) scale(0.87);}
  55% {transform:translateX(-4px) rotate(-0.8deg) scale(1.015);}
  100%{opacity:1;transform:translateX(0) rotate(0) scale(1);}
}
.deal-card{opacity:0}
.deal-card.dealt{animation:dealCard .52s cubic-bezier(.16,1,.3,1) both}

.gold-text{
  background:linear-gradient(135deg,#E9C176 0%,#C8961A 40%,#F5D78E 70%,#987734 100%);
  background-size:200% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:goldShimmer 4s linear infinite;
}
.navlink{font-size:11px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;cursor:pointer;transition:color .25s;text-decoration:none}
.diff-card{border-radius:14px;padding:32px 26px;transition:all .3s;cursor:default}
.diff-card:hover{transform:translateY(-5px)}
.zone-row{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:10px;cursor:pointer;transition:all .2s}
.reveal{opacity:0;transform:translateY(28px);transition:opacity .7s cubic-bezier(.16,1,.3,1),transform .7s cubic-bezier(.16,1,.3,1)}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-d1{transition-delay:.1s}.reveal-d2{transition-delay:.2s}.reveal-d3{transition-delay:.3s}
.card-img{overflow:hidden}
.card-img img{transition:transform .6s cubic-bezier(.16,1,.3,1)}
.prop-card:hover .card-img img{transform:scale(1.07)!important}

/* Leaflet popup override */
.leaflet-popup-content-wrapper{font-family:'Jost',sans-serif;border-radius:8px!important;box-shadow:0 8px 32px rgba(0,0,0,.3)!important}
.leaflet-popup-tip{display:none}

/* ── Mobile responsive ── */
@media(max-width:860px){
  .hero-grid{grid-template-columns:1fr!important;gap:0!important;padding-top:100px!important;padding-bottom:40px!important}

  .sec-inner{padding:0 20px!important}

  .hero-rings{display:none!important}

/* ════════════════════════════════════════
   PARTICLE CANVAS
   ════════════════════════════════════════ */
function ParticleCanvas(){
  const ref=useRef();
  useEffect(()=>{
    const c=ref.current; if(!c)return;
    const ctx=c.getContext('2d');
    let W=c.width=c.offsetWidth,H=c.height=c.offsetHeight;
    const pts=Array.from({length:55},()=>({x:Math.random()*W,y:H+Math.random()*H,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:-Math.random()*.6-.2,a:Math.random()*.45+.1}));
    let raf;
    const draw=()=>{
      ctx.clearRect(0,0,W,H);
      pts.forEach(p=>{
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(233,193,118,${p.a})`;ctx.fill();
        p.x+=p.vx;p.y+=p.vy;
        if(p.y<-10){p.y=H+10;p.x=Math.random()*W;}
        if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      });
      raf=requestAnimationFrame(draw);
    };
    draw();
    const resize=()=>{W=c.width=c.offsetWidth;H=c.height=c.offsetHeight;};
    window.addEventListener('resize',resize);
    return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
  },[]);
  return <canvas ref={ref} style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:1}}/>;
}

/* ════════════════════════════════════════
   LEAFLET MAP COMPONENT
   ════════════════════════════════════════ */
function LiveMap({mode, zones}){
  const containerRef = useRef(null);
  const mapRef = useRef(null);

  useEffect(()=>{
    if(!containerRef.current) return;
    if(mapRef.current){ mapRef.current.remove(); mapRef.current=null; }

    const map = L.map(containerRef.current,{
      center:[30.055,31.530],
      zoom:11,
      zoomControl:false,
      scrollWheelZoom:false,
      attributionControl:true,
    });

    const tileUrl = mode==='dark'
      ? 'https://{s}.basemaps.cartocdn.com/dark_matter/{z}/{x}/{y}{r}.png'
      : 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

    L.tileLayer(tileUrl,{
      attribution:'© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/">CARTO</a>',
      maxZoom:18,
    }).addTo(map);

    L.control.zoom({position:'bottomright'}).addTo(map);

    const goldDot=(color)=>L.divIcon({
      className:'',
      html:`<div style="width:16px;height:16px;background:${color||'#E9C176'};border:2.5px solid rgba(255,255,255,0.6);border-radius:50%;box-shadow:0 0 14px ${color||'#E9C176'}88,0 0 28px ${color||'#E9C176'}44;cursor:pointer"></div>`,
      iconSize:[16,16],iconAnchor:[8,8],
    });

    zones.forEach((z,i)=>{
      if(!ZONE_COORDS[i]) return;
      const m=L.marker(ZONE_COORDS[i],{icon:goldDot(z.color)}).addTo(map);
      m.bindPopup(`<div style="font-family:'Jost',sans-serif;padding:2px 4px"><strong style="font-size:13px;color:#071422">${z.area}</strong><br/><span style="font-size:11px;color:${z.color};font-weight:600">${z.stat}</span></div>`,{closeButton:false,className:'sierra-popup'});
      m.on('mouseover',function(){this.openPopup();});
    });

    mapRef.current=map;
    return()=>{ if(mapRef.current){mapRef.current.remove();mapRef.current=null;} };
  },[mode, zones]);

  return <div ref={containerRef} style={{width:'100%',height:'100%',borderRadius:16}}/>;
}

        </div>
      </section>

      {/* ══ SEARCH + LISTINGS ══ */}
      <section ref={listingsSectionRef} style={{background:mode==='dark'?'#0A1520':th.bgAlt,padding:'80px 0'}}>
        <div className="sec-inner" style={sec}>
          <div className="reveal" style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',marginBottom:40,flexWrap:'wrap',gap:16,flexDirection:isAr?'row-reverse':'row'}}>
            <div style={{textAlign:isAr?'right':'left'}}>
              <Label>{T.secListings}</Label>
              <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(28px,4vw,52px)',fontWeight:300,lineHeight:1.1,letterSpacing:'-0.02em',color:th.text}}>{T.h2Listings}</h2>
            </div>
            <BtnGhost style={{padding:'9px 20px',fontSize:10}}>{T.viewAll}</BtnGhost>
          </div>

          {/* Search bar */}
          <div className="reveal reveal-d1 search-grid" style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr auto',gap:0,background:mode==='dark'?'#122A47':th.card,border:`1px solid ${th.border}`,borderRadius:8,overflow:'hidden',boxShadow:'0 8px 32px rgba(0,0,0,0.15)',marginBottom:40}}>
            {[{label:T.searchType,opts:isAr?['شقة','فيلا','دوبلكس','بنتهاوس']:['Apartment','Villa','Duplex','Penthouse']},{label:T.searchCompound,opts:isAr?['التجمع الخامس','مدينتي','ماونتن فيو','مستقبل']:['Fifth Settlement','Madinaty','Mountain View','Mostakbal']},{label:T.searchBudget,opts:isAr?['أقل من ٥م','٥م–١٠م','١٠م–٢٠م','أكثر من ٢٠م']:['Under 5M EGP','5–10M EGP','10–20M EGP','20M+ EGP']}].map((seg,i)=>(
              <div key={i} style={{padding:'14px 18px',borderRight:`1px solid ${th.border}`}}>
                <div style={{fontSize:9,fontWeight:500,letterSpacing:'.16em',textTransform:'uppercase',color:th.textMuted,marginBottom:3,fontFamily:"'Jost',sans-serif"}}>{seg.label}</div>
                <select style={{background:'transparent',border:'none',outline:'none',color:th.text,fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif",fontSize:13,fontWeight:300,width:'100%',cursor:'pointer'}}>
                  {seg.opts.map(o=><option key={o}>{o}</option>)}
                </select>
              </div>
            ))}
            <BtnGold style={{borderRadius:0,padding:'0 28px',margin:0,fontSize:11}}>{T.searchBtn}</BtnGold>
          </div>

          {/* Listings grid with card-deal animation */}
          <div className="listings-grid" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:22}}>
            {LISTINGS.map((p,i)=>(
              <PropCard key={p.id} p={p} T={T} th={th} dealDelay={i*0.09} dealt={listingsDealt}/>
            ))}
          </div>
        </div>
      </section>

      {/* ══ WHY SIERRA BLU ══ */}
      <section style={{background:th.bg,padding:'96px 0',position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',opacity:mode==='dark'?.025:.02,pointerEvents:'none'}}>
          <ShieldLogo size={600}/>
        </div>
        <div className="sec-inner" style={{...sec,position:'relative',zIndex:2}}>
          <div className="reveal" style={{textAlign:'center',marginBottom:60}}>
            <Label>{T.secWhy}</Label>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(28px,4vw,52px)',fontWeight:300,lineHeight:1.1,letterSpacing:'-0.02em',color:th.text}}>{T.h2Why}</h2>
          </div>
          <div className="why-grid" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:22}}>
            {T.why.map((w,i)=>(
              <div key={i} className={`diff-card reveal reveal-d${i+1}`} style={{background:th.surface,border:`1px solid ${th.border}`,textAlign:isAr?'right':'left'}}>
                <div style={{fontSize:28,color:G,marginBottom:16,fontFamily:"'Cormorant Garamond',serif"}}>{w.icon}</div>
                <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:500,color:th.text,marginBottom:10}}>{w.title}</h3>
                <div style={{width:36,height:2,background:`linear-gradient(90deg,${G2},${G})`,borderRadius:1,marginBottom:14,marginLeft:isAr?'auto':0}}/>
                <p style={{fontSize:13,fontWeight:300,lineHeight:1.85,color:th.textSub,fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}>{w.desc}</p>
              </div>
            ))}
          </div>
          <div className="reveal reveal-d3" style={{marginTop:56,padding:'30px 40px',background:`linear-gradient(130deg,rgba(233,193,118,0.10),rgba(233,193,118,0.04))`,border:`1px solid rgba(233,193,118,0.22)`,borderRadius:14,display:'flex',alignItems:'center',justifyContent:'space-between',flexDirection:isAr?'row-reverse':'row',flexWrap:'wrap',gap:20}}>
            <div style={{textAlign:isAr?'right':'left'}}>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:28,fontWeight:400,color:th.text,marginBottom:4}}>{T.bannerH}</div>
              <div style={{fontSize:12,color:`rgba(233,193,118,0.7)`,fontFamily:isAr?"'Jost',sans-serif":"'Cairo',sans-serif"}}>{T.bannerSub}</div>
            </div>
            <BtnGold>{T.bannerBtn}</BtnGold>
          </div>
        </div>
      </section>

      {/* ══ INTELLIGENCE MAP (Leaflet) ══ */}
      <section style={{background:mode==='dark'?'#091828':th.bgAlt,padding:'96px 0'}}>
        <div className="sec-inner" style={sec}>
          <div className="map-grid" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:72,alignItems:'center'}}>
            <div style={{order:isAr?2:1}}>
              <div className="reveal" style={{textAlign:isAr?'right':'left'}}>
                <Label>{T.secMap}</Label>
                <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(28px,3.5vw,48px)',fontWeight:300,lineHeight:1.15,letterSpacing:'-0.02em',color:th.text,marginBottom:10}}>
                  {T.mapH1}<br/><em className="gold-text" style={{fontStyle:'italic'}}>{T.mapH2}</em>
                </h2>
                <GoldRule/>
                <p style={{fontSize:14,fontWeight:300,lineHeight:1.85,color:th.textSub,marginBottom:24,fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}>{T.mapDesc}</p>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {T.zones.map((z,i)=>(
                  <div key={i} className={`zone-row reveal reveal-d${i+1}`} style={{background:activeZone===i?th.surfaceHover:th.surface,border:`1px solid ${activeZone===i?z.color+'55':th.border}`,flexDirection:isAr?'row-reverse':'row'}} onClick={()=>setActiveZone(activeZone===i?null:i)}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:z.color,flexShrink:0,boxShadow:`0 0 8px ${z.color}88`}}/>
                    <div style={{flex:1,fontSize:13,fontWeight:500,color:th.text,fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif",textAlign:isAr?'right':'left'}}>{z.area}</div>
                    <span style={{fontSize:11,fontWeight:600,color:z.color,background:`${z.color}18`,padding:'3px 10px',borderRadius:50,fontFamily:"'DM Mono',monospace",whiteSpace:'nowrap'}}>{z.stat}</span>
                  </div>
                ))}
              </div>
              <div className="reveal reveal-d3" style={{marginTop:24}}>
                <BtnGhost style={{width:'100%',justifyContent:'center'}}>{T.mapBtn}</BtnGhost>
              </div>
            </div>

            {/* Live Leaflet map */}
            <div className="reveal reveal-d2 map-visual" style={{order:isAr?1:2,height:480}}>
              <div style={{position:'relative',border:`1px solid rgba(233,193,118,0.22)`,borderRadius:16,overflow:'hidden',boxShadow:`0 32px 80px rgba(0,0,0,.4)`,height:'100%'}}>
                <LiveMap mode={mode} zones={T.zones}/>
                {/* Corner brackets */}
                {[{top:12,left:12},{top:12,right:12},{bottom:12,left:12},{bottom:12,right:12}].map((pos,i)=>(
                  <div key={i} style={{position:'absolute',width:18,height:18,...pos,borderTop:i<2?`2px solid rgba(233,193,118,0.5)`:undefined,borderBottom:i>=2?`2px solid rgba(233,193,118,0.5)`:undefined,borderLeft:i%2===0?`2px solid rgba(233,193,118,0.5)`:undefined,borderRight:i%2!==0?`2px solid rgba(233,193,118,0.5)`:undefined,zIndex:1000,pointerEvents:'none'}}/>
                ))}
                <div style={{position:'absolute',bottom:10,left:'50%',transform:'translateX(-50%)',fontSize:8,letterSpacing:'4px',color:'rgba(233,193,118,0.35)',fontFamily:"'Jost',sans-serif",zIndex:1000,pointerEvents:'none',whiteSpace:'nowrap'}}>SIERRA BLU INTELLIGENCE</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* ══ SIERRA AI ══ */}
      <section style={{padding:'96px 0',background:mode==='dark'?`linear-gradient(135deg,#0A1520 0%,#0D2035 50%,#122A47 100%)`:`linear-gradient(135deg,${th.bgAlt} 0%,${th.bg} 50%,${th.bg2} 100%)`,borderTop:`1px solid ${th.border}`,borderBottom:`1px solid ${th.border}`}}>
        <div className="sec-inner" style={sec}>
          <div className="ai-grid" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:80,alignItems:'center'}}>
            <div className="reveal" style={{textAlign:isAr?'right':'left',order:isAr?2:1}}>
              <Label>{T.secAI}</Label>
              <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(28px,4vw,48px)',fontWeight:300,lineHeight:1.1,letterSpacing:'-0.02em',color:th.text,marginBottom:10}}>{T.aiH}</h2>
              <div style={{fontSize:11,fontWeight:500,letterSpacing:'.1em',color:'#1B6CA8',textTransform:'uppercase',marginBottom:16,fontFamily:"'Jost',sans-serif"}}>{T.aiSub}</div>
              <GoldRule/>
              <p style={{fontSize:14,fontWeight:300,lineHeight:1.85,color:th.textSub,margin:'16px 0 24px',fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}>{T.aiDesc}</p>
              <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:28}}>
                {T.aiFeatures.map((f,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10,fontSize:13,color:th.textSub,flexDirection:isAr?'row-reverse':'row',fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}>
                    <div style={{width:6,height:6,borderRadius:'50%',background:G,flexShrink:0}}/>
                    {f}
                  </div>
                ))}
              </div>
              <BtnGold>{T.aiCTA}</BtnGold>
            </div>

            <div className="reveal reveal-d2" style={{order:isAr?1:2}}>
              <div style={{background:mode==='dark'?'rgba(255,255,255,0.045)':'rgba(27,108,168,0.06)',border:`1px solid rgba(233,193,118,0.25)`,borderRadius:16,padding:28,backdropFilter:'blur(12px)',boxShadow:`0 0 40px rgba(233,193,118,0.10)`}}>
                <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:22}}>
                  <div style={{width:50,height:50,borderRadius:'50%',background:`linear-gradient(135deg,${G2},${G})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0,position:'relative'}}>
                    ◈
                    <div style={{position:'absolute',inset:-4,borderRadius:'50%',border:`1px solid ${G}`,animation:'pulseRing 2s infinite'}}/>
                  </div>
                  <div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:500,color:th.text}}>Sierra</div>
                    <div style={{fontSize:11,color:'#4ADE80',marginTop:2,fontFamily:"'DM Mono',monospace",fontWeight:300}}>● Online · 4s avg</div>
                  </div>
                </div>
                {T.aiChat.map((msg,i)=>(
                  <div key={i} style={{display:'flex',justifyContent:msg.from==='user'?'flex-end':'flex-start',marginBottom:10}}>
                    <div style={{maxWidth:'80%',padding:'10px 14px',borderRadius:12,fontSize:13,fontWeight:300,lineHeight:1.6,fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif",background:msg.from==='user'?`linear-gradient(135deg,${G2},${G})`:'rgba(255,255,255,0.06)',color:msg.from==='user'?'#071422':th.text,border:msg.from==='user'?'none':`1px solid ${th.border}`}}>{msg.text}</div>
                  </div>
                ))}
                <div style={{textAlign:'center',marginTop:16,fontSize:11,color:th.textMuted,fontFamily:"'Jost',sans-serif"}}>
                  AI-powered · 24/7 · Arabic & English
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* ══ TESTIMONIALS ══ */}
      <section style={{background:th.bg,padding:'96px 0'}}>
        <div className="sec-inner" style={sec}>
          <div className="reveal" style={{textAlign:'center',marginBottom:52}}>
            <Label>{T.secTesti}</Label>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(28px,4vw,48px)',fontWeight:300,lineHeight:1.1,letterSpacing:'-0.02em',color:th.text}}>{T.h2Testi}</h2>
          </div>
          <div className="testi-grid" style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:22}}>
            {T.testimonials.map((t,i)=>(
              <div key={i} className={`reveal reveal-d${i+1}`} style={{padding:28,background:th.card,border:`1px solid ${th.cardBorder}`,borderRadius:14,boxShadow:'0 4px 24px rgba(0,0,0,0.1)'}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:48,color:G,lineHeight:.7,marginBottom:16}}>"</div>
                <p style={{fontSize:14,fontWeight:300,lineHeight:1.85,color:th.textSub,marginBottom:20,fontStyle:'italic',fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}>{t.q}</p>
                <div style={{display:'flex',alignItems:'center',gap:12,flexDirection:isAr?'row-reverse':'row'}}>
                  <div style={{width:40,height:40,borderRadius:'50%',background:`linear-gradient(135deg,${G2},${G})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#071422',flexShrink:0,fontFamily:"'DM Mono',monospace"}}>{t.i}</div>
                  <div style={{textAlign:isAr?'right':'left'}}>
                    <div style={{fontSize:14,fontWeight:500,color:th.text,fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}>{t.name}</div>
                    <div style={{fontSize:11,color:th.textMuted,fontFamily:"'Jost',sans-serif"}}>{t.role}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ══ CTA FORM ══ */}
      <section style={{padding:'96px 0',background:mode==='dark'?`linear-gradient(135deg,#0A1520,#0D2035)`:`linear-gradient(135deg,${th.bg},${th.bgAlt})`,borderTop:`1px solid ${th.border}`}}>
        <div className="sec-inner" style={{...sec,maxWidth:600}}>
          <div className="reveal" style={{textAlign:'center',marginBottom:40}}>
            <Label>{T.ctaTag}</Label>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(28px,4vw,48px)',fontWeight:300,lineHeight:1.15,letterSpacing:'-0.02em',color:th.text,marginBottom:12}}>{T.ctaH}</h2>
            <p style={{fontSize:14,fontWeight:300,color:th.textSub,lineHeight:1.8,fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}>{T.ctaSub}</p>
          </div>
          <div className="reveal reveal-d1">
            {submitted?(
              <div style={{textAlign:'center',padding:40,background:mode==='dark'?'rgba(233,193,118,0.08)':'rgba(233,193,118,0.14)',border:`1px solid rgba(233,193,118,0.3)`,borderRadius:12}}>
                <div style={{fontSize:40,marginBottom:12}}>✓</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,color:G,marginBottom:8}}>{lang==='en'?'Thank you.':'شكراً.'}</div>
                <p style={{fontSize:14,color:th.textSub,fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}>{T.formSuccess}</p>
              </div>
            ):(
              <form onSubmit={e=>{e.preventDefault();setSubmitted(true);}} style={{display:'flex',flexDirection:'column',gap:14}}>
                {[{key:'name',label:T.formName,type:'text'},{key:'phone',label:T.formPhone,type:'tel'}].map(f=>(
                  <input key={f.key} type={f.type} required placeholder={f.label} value={formData[f.key]} onChange={e=>setFormData({...formData,[f.key]:e.target.value})} style={{background:th.card,border:`1px solid ${th.border}`,borderRadius:6,padding:'13px 16px',color:th.text,fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif",fontSize:14,fontWeight:300,outline:'none',transition:'border-color .2s',textAlign:isAr?'right':'left'}}
                    onFocus={e=>e.target.style.borderColor=G} onBlur={e=>e.target.style.borderColor=th.border}/>
                ))}
                <BtnGold style={{justifyContent:'center',padding:'14px'}}>{T.formSubmit}</BtnGold>
              </form>
            )}
          </div>
        </div>
      </section>

      {/* ══ FOOTER ══ */}
      <footer style={{background:'#040E1C',color:'#EFF8F7',padding:'72px 0 36px',borderTop:`1px solid rgba(233,193,118,0.12)`}}>
        <div className="sec-inner" style={sec}>
          <div className="footer-grid" style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:60,marginBottom:48}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16,flexDirection:isAr?'row-reverse':'row'}}>
                <ShieldLogo size={42}/>
                <div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:isAr?16:19,fontWeight:600,letterSpacing:isAr?'.06em':'.2em',color:G}}>{T.brand}</div>
                  <div style={{fontSize:8,letterSpacing:'.38em',color:'rgba(239,248,247,0.45)',fontFamily:"'Jost',sans-serif"}}>{T.sub}</div>
                </div>
              </div>
              <p style={{fontSize:13,fontWeight:300,lineHeight:1.85,color:'rgba(239,248,247,0.45)',maxWidth:280,fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif",textAlign:isAr?'right':'left'}}>{T.footDesc}</p>
            </div>
            {[{title:T.footNav,links:T.footNavLinks},{title:T.footMarkets,links:T.footMarketLinks}].map(col=>(
              <div key={col.title} style={{textAlign:isAr?'right':'left'}}>
                <div style={{fontSize:9,fontWeight:500,letterSpacing:'.22em',color:G,marginBottom:16,fontFamily:"'Jost',sans-serif"}}>{col.title}</div>
                {col.links.map(l=>(
                  <div key={l} style={{fontSize:12,fontWeight:300,color:'rgba(239,248,247,0.45)',marginBottom:10,cursor:'pointer',transition:'color .2s',fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}
                    onMouseOver={e=>e.target.style.color=G} onMouseOut={e=>e.target.style.color='rgba(239,248,247,0.45)'}>{l}</div>
                ))}
              </div>
            ))}
          </div>
          <div style={{borderTop:'1px solid rgba(239,248,247,0.07)',paddingTop:24,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12,flexDirection:isAr?'row-reverse':'row'}}>
            <div style={{fontSize:11,fontWeight:300,color:'rgba(239,248,247,0.28)',fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}>{T.copyright}</div>
            <div style={{display:'flex',gap:20}}>
              {T.legal.map(l=>(
                <span key={l} style={{fontSize:11,fontWeight:300,color:'rgba(239,248,247,0.28)',cursor:'pointer',transition:'color .2s',fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}
                  onMouseOver={e=>e.target.style.color=G} onMouseOut={e=>e.target.style.color='rgba(239,248,247,0.28)'}>{l}</span>
              ))}
            </div>
          </div>
        </div>
      </footer>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
