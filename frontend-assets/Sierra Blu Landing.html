   ════════════════════════════════════════ */
function ParticleCanvas(){
  const ref=useRef();
  useEffect(()=>{
    const c=ref.current; if(!c)return;
    const ctx=c.getContext('2d');
    let W=c.width=c.offsetWidth,H=c.height=c.offsetHeight;
    const pts=Array.from({length:60},()=>({x:Math.random()*W,y:H+Math.random()*H,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.3,vy:-Math.random()*.6-.2,a:Math.random()*.5+.1}));
    let raf;
    const draw=()=>{
      ctx.clearRect(0,0,W,H);
      pts.forEach(p=>{
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(233,193,118,${p.a})`;ctx.fill();
        p.x+=p.vx;p.y+=p.vy;
        if(p.y<-10){p.y=H+10;p.x=Math.random()*W;}
        if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      });
      raf=requestAnimationFrame(draw);
    };
    draw();
    const resize=()=>{W=c.width=c.offsetWidth;H=c.height=c.offsetHeight;};
    window.addEventListener('resize',resize);
    return()=>{cancelAnimationFrame(raf);window.removeEventListener('resize',resize);};
  },[]);
  return <canvas ref={ref} style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none',zIndex:1}}/>;
}

              <div style={{display:'flex',flexDirection:'column',gap:10}}>
                {T.zones.map((z,i)=>(
                  <div key={i} className={`zone-row reveal reveal-d${i+1}`} style={{background:activeZone===i?th.surfaceHover:th.surface,border:`1px solid ${activeZone===i?z.color+'44':th.border}`,flexDirection:isAr?'row-reverse':'row',transition:'all .2s'}} onClick={()=>setActiveZone(activeZone===i?null:i)}>
                    <div style={{width:8,height:8,borderRadius:'50%',background:z.color,flexShrink:0,boxShadow:`0 0 8px ${z.color}88`}}/>
                    <div style={{flex:1,fontSize:13,fontWeight:500,color:th.text,fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif",textAlign:isAr?'right':'left'}}>{z.area}</div>
                    <span style={{fontSize:11,fontWeight:600,color:z.color,background:`${z.color}18`,padding:'3px 10px',borderRadius:50,fontFamily:"'Jost',sans-serif",whiteSpace:'nowrap'}}>{z.stat}</span>
                  </div>
                ))}
              </div>
              <div className="reveal reveal-d3" style={{marginTop:24}}>
                <BtnGhost style={{width:'100%',justifyContent:'center'}}>{T.mapBtn}</BtnGhost>
              </div>
            </div>
            {/* Map visual */}
            <div className="reveal reveal-d2" style={{order:isAr?1:2}}>
              <div style={{position:'relative',background:mode==='dark'?'rgba(4,14,28,.9)':'rgba(239,248,247,.9)',border:`1px solid rgba(233,193,118,0.2)`,borderRadius:16,overflow:'hidden',boxShadow:`0 32px 80px rgba(0,0,0,.4)`,aspectRatio:'1.05'}}>
                <svg viewBox="0 0 500 476" style={{width:'100%',height:'100%'}}>
                  <defs>
                    <pattern id="mg2" width="28" height="28" patternUnits="userSpaceOnUse">
                      <path d="M28 0L0 0 0 28" fill="none" stroke={G} strokeWidth=".25" opacity=".2"/>
                    </pattern>
                    <radialGradient id="mgr2" cx="50%" cy="50%" r="50%">
                      <stop offset="0%" stopColor={G} stopOpacity=".06"/>
                      <stop offset="100%" stopColor={G} stopOpacity="0"/>
                    </radialGradient>
                    <filter id="pin-glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                  </defs>
                  <rect width="500" height="476" fill="url(#mg2)"/>
                  <rect width="500" height="476" fill="url(#mgr2)"/>
                  {[[190,20,190,456],[70,160,430,160],[70,250,430,250],[290,40,290,430]].map(([x1,y1,x2,y2],i)=>(
                    <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke={`rgba(233,193,118,0.15)`} strokeWidth="1"/>
                  ))}
                  {[{cx:150,cy:180,name:'Fifth Settlement',stat:'Growth +12%'},{cx:310,cy:140,name:'Madinaty',stat:'High Demand'},{cx:225,cy:265,name:'Mountain View',stat:'Yield 8%'},{cx:375,cy:240,name:'Mostakbal City',stat:'Off‑Market'}].map((pin,i)=>(
                    <g key={i} style={{cursor:'pointer'}}>
                      <circle cx={pin.cx} cy={pin.cy} r="18" fill="none" stroke={G} strokeWidth="1" opacity=".25" style={{animation:`pulseRing 2.5s ${i*.5}s infinite`}}/>
                      <circle cx={pin.cx} cy={pin.cy} r="7" fill={G} filter="url(#pin-glow)"/>
                      <circle cx={pin.cx} cy={pin.cy} r="3" fill="#fff"/>
                      <rect x={pin.cx-52} y={pin.cy-50} width="104" height="36" rx="6" fill={mode==='dark'?'rgba(4,14,28,.92)':'rgba(239,248,247,.95)'} stroke={`rgba(233,193,118,0.4)`} strokeWidth="1"/>
                      <text x={pin.cx} y={pin.cy-33} textAnchor="middle" fill={th.text} fontSize="9" fontFamily="'Jost',sans-serif" fontWeight="600">{pin.name}</text>
                      <text x={pin.cx} y={pin.cy-20} textAnchor="middle" fill={G} fontSize="8.5" fontFamily="'Jost',sans-serif">{pin.stat}</text>
                    </g>
                  ))}
                  <text x="250" y="462" textAnchor="middle" fill={`rgba(233,193,118,0.2)`} fontSize="9" fontFamily="'Jost',sans-serif" letterSpacing="4">SIERRA BLU INTELLIGENCE</text>
                </svg>
                {/* Corner brackets */}
                {[{top:12,left:12},{top:12,right:12},{bottom:12,left:12},{bottom:12,right:12}].map((pos,i)=>(
                  <div key={i} style={{position:'absolute',width:18,height:18,...pos,borderTop:i<2?`2px solid rgba(233,193,118,0.5)`:undefined,borderBottom:i>=2?`2px solid rgba(233,193,118,0.5)`:undefined,borderLeft:i%2===0?`2px solid rgba(233,193,118,0.5)`:undefined,borderRight:i%2!==0?`2px solid rgba(233,193,118,0.5)`:undefined}}/>
                ))}
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* ══ SIERRA AI ══ */}
      <section style={{padding:'96px 0',background:mode==='dark'?`linear-gradient(135deg,#050B14 0%,#071422 50%,#0D2444 100%)`:`linear-gradient(135deg,#E2EDF8 0%,#F0F5FC 50%,#F8FAFF 100%)`,borderTop:`1px solid ${th.border}`,borderBottom:`1px solid ${th.border}`}}>
        <div style={sec}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:80,alignItems:'center'}}>
            <div className="reveal" style={{textAlign:isAr?'right':'left',order:isAr?2:1}}>
              <Label>{T.secAI}</Label>
              <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(28px,4vw,48px)',fontWeight:300,lineHeight:1.1,letterSpacing:'-0.02em',color:th.text,marginBottom:10}}>{T.aiH}</h2>
              <div style={{fontSize:11,fontWeight:500,letterSpacing:'.1em',color:'#1B6CA8',textTransform:'uppercase',marginBottom:16,fontFamily:"'Jost',sans-serif"}}>{T.aiSub}</div>
              <GoldRule/>
              <p style={{fontSize:14,fontWeight:300,lineHeight:1.8,color:th.textSub,margin:'16px 0 24px',fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}>{T.aiDesc}</p>
              <div style={{display:'flex',flexDirection:'column',gap:10,marginBottom:28}}>
                {T.aiFeatures.map((f,i)=>(
                  <div key={i} style={{display:'flex',alignItems:'center',gap:10,fontSize:13,color:th.textSub,flexDirection:isAr?'row-reverse':'row',fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}>
                    <div style={{width:6,height:6,borderRadius:'50%',background:G,flexShrink:0}}/>
                    {f}
                  </div>
                ))}
              </div>
              <BtnGold>{T.aiCTA}</BtnGold>
            </div>

            {/* Bot card */}
            <div className="reveal reveal-d2" style={{order:isAr?1:2}}>
              <div style={{background:mode==='dark'?'rgba(255,255,255,0.04)':'rgba(27,108,168,0.05)',border:`1px solid rgba(233,193,118,0.25)`,borderRadius:16,padding:28,backdropFilter:'blur(12px)',boxShadow:`0 0 40px rgba(233,193,118,0.12)`}}>
                <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:22}}>
                  <div style={{width:50,height:50,borderRadius:'50%',background:`linear-gradient(135deg,${G2},${G})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0,position:'relative'}}>
                    ◈
                    <div style={{position:'absolute',inset:-4,borderRadius:'50%',border:`1px solid ${G}`,animation:'pulseRing 2s infinite'}}/>
                  </div>
                  <div>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:500,color:th.text}}>Sierra</div>
                    <div style={{fontSize:11,color:'#4ADE80',marginTop:2,fontFamily:"'Jost',sans-serif"}}>● Online · 4s avg. response</div>
                  </div>
                </div>
                {T.aiChat.map((msg,i)=>(
                  <div key={i} style={{display:'flex',justifyContent:msg.from==='user'?'flex-end':'flex-start',marginBottom:10}}>
                    <div style={{maxWidth:'80%',padding:'10px 14px',borderRadius:12,fontSize:13,fontWeight:300,lineHeight:1.55,fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif",background:msg.from==='user'?`linear-gradient(135deg,${G2},${G})`:'var(--surface, rgba(255,255,255,0.06))',color:msg.from==='user'?'#071422':th.text,border:msg.from==='user'?'none':`1px solid ${th.border}`}}>{msg.text}</div>
                  </div>
                ))}
                <div style={{textAlign:'center',marginTop:16,fontSize:11,color:th.textMuted,fontFamily:"'Jost',sans-serif"}}>
                  🤖 AI-powered · 24/7 · Arabic & English
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      {/* ══ TESTIMONIALS ══ */}
      <section style={{background:th.bg,padding:'96px 0'}}>
        <div style={sec}>
          <div className="reveal" style={{textAlign:'center',marginBottom:52}}>
            <Label>{T.secTesti}</Label>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(28px,4vw,48px)',fontWeight:300,lineHeight:1.1,letterSpacing:'-0.02em',color:th.text}}>{T.h2Testi}</h2>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:22}}>
            {T.testimonials.map((t,i)=>(
              <div key={i} className={`reveal reveal-d${i+1}`} style={{padding:28,background:th.card,border:`1px solid ${th.cardBorder}`,borderRadius:14,boxShadow:'0 4px 24px rgba(0,0,0,0.1)'}}>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:48,color:G,lineHeight:.7,marginBottom:16}}>"</div>
                <p style={{fontSize:14,fontWeight:300,lineHeight:1.8,color:th.textSub,marginBottom:20,fontStyle:'italic',fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}>{t.q}</p>
                <div style={{display:'flex',alignItems:'center',gap:12,flexDirection:isAr?'row-reverse':'row'}}>
                  <div style={{width:40,height:40,borderRadius:'50%',background:`linear-gradient(135deg,${G2},${G})`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#071422',flexShrink:0}}>{t.i}</div>
                  <div style={{textAlign:isAr?'right':'left'}}>
                    <div style={{fontSize:14,fontWeight:500,color:th.text,fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}>{t.name}</div>
                    <div style={{fontSize:11,color:th.textMuted,fontFamily:"'Jost',sans-serif"}}>{t.role}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </section>

      {/* ══ CTA FORM ══ */}
      <section style={{padding:'96px 0',background:mode==='dark'?'linear-gradient(135deg,#050B14,#071422)':'linear-gradient(135deg,#F0F5FC,#E2EDF8)',borderTop:`1px solid ${th.border}`}}>
        <div style={{...sec,maxWidth:600}}>
          <div className="reveal" style={{textAlign:'center',marginBottom:40}}>
            <Label>{T.ctaTag}</Label>
            <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:'clamp(28px,4vw,48px)',fontWeight:300,lineHeight:1.15,letterSpacing:'-0.02em',color:th.text,marginBottom:12}}>{T.ctaH}</h2>
            <p style={{fontSize:14,fontWeight:300,color:th.textSub,lineHeight:1.7,fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}>{T.ctaSub}</p>
          </div>
          <div className="reveal reveal-d1">
            {submitted?(
              <div style={{textAlign:'center',padding:40,background:mode==='dark'?'rgba(233,193,118,0.08)':'rgba(233,193,118,0.14)',border:`1px solid rgba(233,193,118,0.3)`,borderRadius:12}}>
                <div style={{fontSize:40,marginBottom:12}}>✓</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,color:G,marginBottom:8}}>{lang==='en'?'Thank you!':'شكراً!'}</div>
                <p style={{fontSize:14,color:th.textSub,fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}>{T.formSuccess}</p>
              </div>
            ):(
              <form onSubmit={e=>{e.preventDefault();setSubmitted(true);}} style={{display:'flex',flexDirection:'column',gap:14}}>
                {[{key:'name',label:T.formName,type:'text'},{key:'phone',label:T.formPhone,type:'tel'}].map(f=>(
                  <input key={f.key} type={f.type} required placeholder={f.label} value={formData[f.key]} onChange={e=>setFormData({...formData,[f.key]:e.target.value})} style={{background:th.card,border:`1px solid ${th.border}`,borderRadius:6,padding:'13px 16px',color:th.text,fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif",fontSize:14,fontWeight:300,outline:'none',transition:'border-color .2s',textAlign:isAr?'right':'left'}}
                    onFocus={e=>e.target.style.borderColor=G} onBlur={e=>e.target.style.borderColor=th.border}/>
                ))}
                <BtnGold style={{justifyContent:'center',padding:'14px'}}>{T.formSubmit}</BtnGold>
              </form>
            )}
          </div>
        </div>
      </section>

      {/* ══ FOOTER ══ */}
      <footer style={{background:mode==='dark'?'#040E1C':'#040E1C',color:'#EFF8F7',padding:'72px 0 36px',borderTop:`1px solid rgba(233,193,118,0.12)`}}>
        <div style={sec}>
          <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:60,marginBottom:48}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16,flexDirection:isAr?'row-reverse':'row'}}>
                <LogoMark size={42} mode='dark'/>
                <div>
                  <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:isAr?16:19,fontWeight:600,letterSpacing:isAr?'.06em':'.2em',color:G}}>{T.brand}</div>
                  <div style={{fontSize:8,letterSpacing:'.38em',color:'rgba(239,248,247,0.4)',fontFamily:"'Jost',sans-serif"}}>{T.sub}</div>
                </div>
              </div>
              <p style={{fontSize:13,fontWeight:300,lineHeight:1.8,color:'rgba(239,248,247,0.4)',maxWidth:280,fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif",textAlign:isAr?'right':'left'}}>{T.footDesc}</p>
            </div>
            {[{title:T.footNav,links:T.footNavLinks},{title:T.footMarkets,links:T.footMarketLinks}].map(col=>(
              <div key={col.title} style={{textAlign:isAr?'right':'left'}}>
                <div style={{fontSize:9,fontWeight:500,letterSpacing:'.22em',color:G,marginBottom:16,fontFamily:"'Jost',sans-serif"}}>{col.title}</div>
                {col.links.map(l=>(
                  <div key={l} style={{fontSize:12,fontWeight:300,color:'rgba(239,248,247,0.4)',marginBottom:10,cursor:'pointer',transition:'color .2s',fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}
                    onMouseOver={e=>e.target.style.color=G} onMouseOut={e=>e.target.style.color='rgba(239,248,247,0.4)'}>{l}</div>
                ))}
              </div>
            ))}
          </div>
          <div style={{borderTop:'1px solid rgba(239,248,247,0.06)',paddingTop:24,display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12,flexDirection:isAr?'row-reverse':'row'}}>
            <div style={{fontSize:11,fontWeight:300,color:'rgba(239,248,247,0.25)',fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}>{T.copyright}</div>
            <div style={{display:'flex',gap:20}}>
              {T.legal.map(l=>(
                <span key={l} style={{fontSize:11,fontWeight:300,color:'rgba(239,248,247,0.25)',cursor:'pointer',transition:'color .2s',fontFamily:isAr?"'Cairo',sans-serif":"'Jost',sans-serif"}}
                  onMouseOver={e=>e.target.style.color=G} onMouseOut={e=>e.target.style.color='rgba(239,248,247,0.25)'}>{l}</span>
              ))}
            </div>
          </div>
        </div>
      </footer>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
